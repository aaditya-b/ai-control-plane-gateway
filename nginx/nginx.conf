# ──────────────────────────────────────────────────────────────────────────────
# AI Control Plane Gateway — Nginx Reverse Proxy
#
# IMPORTANT: Replace every occurrence of "YOUR_DOMAIN.COM" with your actual
#            domain name before deploying (the deploy.sh script does this
#            automatically).
#
# Features:
#   • HTTP → HTTPS redirect
#   • TLS 1.2/1.3 only, strong cipher suite
#   • Security headers (HSTS, CSP, X-Frame-Options, etc.)
#   • Rate limiting (60 req/min per IP on API, 300 req/min on health)
#   • Let's Encrypt webroot challenge support
#   • Prometheus /metrics restricted to internal IPs
#   • Grafana served at /grafana/
#   • Real-IP logging and X-Forwarded-For passthrough
# ──────────────────────────────────────────────────────────────────────────────

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /tmp/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Logging ──────────────────────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" rt=$request_time '
                    'uct=$upstream_connect_time urt=$upstream_response_time';
    access_log /var/log/nginx/access.log main buffer=16k;

    # ── Performance ───────────────────────────────────────────────────────────
    sendfile           on;
    tcp_nopush         on;
    tcp_nodelay        on;
    keepalive_timeout  65;
    gzip               on;
    gzip_types         application/json text/plain application/javascript;

    # ── Security ──────────────────────────────────────────────────────────────
    server_tokens off;
    client_max_body_size 10m;
    client_body_timeout  30s;
    client_header_timeout 10s;

    # ── Rate limiting zones ───────────────────────────────────────────────────
    # API endpoints: 60 requests/minute per IP (1 req/sec)
    limit_req_zone $binary_remote_addr zone=api:20m rate=60r/m;
    # Health / metrics: more lenient
    limit_req_zone $binary_remote_addr zone=health:5m rate=300r/m;
    limit_req_status 429;

    # ── Upstream: AI Control Plane Gateway ────────────────────────────────────
    upstream gateway {
        server gateway:8080;
        keepalive 32;
    }

    # ── Upstream: Grafana ─────────────────────────────────────────────────────
    upstream grafana {
        server grafana:3000;
        keepalive 8;
    }

    # ── HTTP: redirect everything to HTTPS + Let's Encrypt challenge ──────────
    server {
        listen 80 default_server;
        server_name _;

        # Let's Encrypt ACME challenge (served from certbot-webroot volume)
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
            try_files $uri =404;
        }

        # Redirect all other traffic to HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ── HTTPS: main server ────────────────────────────────────────────────────
    server {
        listen 443 ssl;
        http2 on;
        server_name YOUR_DOMAIN.COM;

        # ── TLS ───────────────────────────────────────────────────────────────
        ssl_certificate     /etc/letsencrypt/live/YOUR_DOMAIN.COM/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN.COM/privkey.pem;
        ssl_session_cache   shared:SSL:20m;
        ssl_session_timeout 1d;
        ssl_session_tickets off;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
        ssl_prefer_server_ciphers off;

        # ── Security headers ──────────────────────────────────────────────────
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Frame-Options DENY always;
        add_header X-Content-Type-Options nosniff always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline';" always;

        # ── API: /v1/* and /chat/* ────────────────────────────────────────────
        location ~ ^/(v1|chat)/ {
            limit_req zone=api burst=30 nodelay;

            proxy_pass         http://gateway;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            # LLM calls can be slow — generous timeouts
            proxy_read_timeout    120s;
            proxy_send_timeout     30s;
            proxy_connect_timeout  10s;

            # Don't buffer streaming responses
            proxy_buffering off;
        }

        # ── Health check ──────────────────────────────────────────────────────
        location /health {
            limit_req zone=health burst=10 nodelay;
            proxy_pass        http://gateway;
            proxy_set_header  Host $host;
            access_log        off;
        }

        # ── Prometheus metrics (internal IPs only) ────────────────────────────
        location /metrics {
            # Allow Docker internal networks + localhost
            allow 10.0.0.0/8;
            allow 172.16.0.0/12;
            allow 192.168.0.0/16;
            allow 127.0.0.1;
            deny  all;

            proxy_pass http://gateway;
            proxy_set_header Host $host;
            access_log off;
        }

        # ── Grafana at /grafana/ ──────────────────────────────────────────────
        location /grafana/ {
            proxy_pass         http://grafana/;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 120s;
        }

        # ── Grafana websocket (live dashboards) ───────────────────────────────
        location /grafana/api/live/ {
            proxy_pass             http://grafana/api/live/;
            proxy_http_version     1.1;
            proxy_set_header       Upgrade    $http_upgrade;
            proxy_set_header       Connection "upgrade";
            proxy_set_header       Host       $host;
        }

        # ── Docs (FastAPI Swagger UI) ─────────────────────────────────────────
        location /docs {
            proxy_pass        http://gateway;
            proxy_set_header  Host $host;
        }

        location /openapi.json {
            proxy_pass        http://gateway;
            proxy_set_header  Host $host;
        }
    }
}
